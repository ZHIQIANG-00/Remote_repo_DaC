# Full behavioral test suite for the Nozomi N2OS decoder (nozomi_n2os)
# and rules (110xxx). One positive case per rule, plus a decoder
# field-extraction case, the base-rule path, and negative/boundary cases.
# The runner reads every *.yml in tests/cases/. Each log is a single line.

# === Decoder field extraction (rich assertion on one representative event) ===
# Confirms the sibling decoders extract the CEF header AND the network fields.
- name: "Decoder extracts CEF and network fields (VI:NEW-LINK)"
  log: 'Jun 24 2026 13:06:32 denny-nuc-cmc n2osevents[0]: CEF:0|Nozomi Networks|N2OS|26.3.0-05291746_EEBD7|VI:NEW-LINK|New link|4|app=syslog dvc=192.168.50.134 dvchost=guardian-nuc-2 dst=192.168.50.53 dpt=514 src=192.168.50.187 spt=8588 proto=UDP'
  expect:
    rule_id: "110003"
    level: 3
    decoder: "nozomi_n2os"
    groups: ["network_discovery"]
    fields:
      signature: "VI:NEW-LINK"
      srcip: "192.168.50.187"
      dstip: "192.168.50.53"
      protocol: "UDP"

