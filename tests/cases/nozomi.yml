# === Base-rule path: an unknown signature decodes (110000, level 0) but does not alert ===
- name: "Unknown Nozomi signature decodes but raises no alert"
  log: 'Jun 24 2026 13:06:32 denny-nuc-cmc n2osevents[0]: CEF:0|Nozomi Networks|N2OS|26.3.0-05291746_EEBD7|VI:UNKNOWN-SIGNATURE|Unknown event|4|app=syslog dvc=192.168.50.134 dvchost=guardian-nuc-2 dst=192.168.50.53 dpt=514 src=192.168.50.187 spt=8588 proto=UDP'
