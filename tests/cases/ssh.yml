# Example behavioral tests. Add one file per data source / rule group.

- name: "SSH invalid user fires built-in 5710"
  log: "Oct 15 21:07:00 linux-agent sshd[29205]: Invalid user blimey from 18.18.18.18 port 48928"
  expect:
    rule_id: "5710"
    min_level: 5
    decoder: "sshd"
    groups: ["authentication_failed"]

- name: "Accepted SSH login is decoded but stays low severity"
  log: "Oct 15 21:09:00 linux-agent sshd[29300]: Accepted password for alice from 10.0.0.9 port 50122 ssh2"
  expect:
    decoder: "sshd"
    max_level: 5

- name: "Random noise should not raise an alert"
  log: "Oct 15 21:10:00 linux-agent kernel: usb 1-1: new high-speed USB device"
  expect_no_rule: true

